name: Check Format
on:
  pull_request:
  push:
    branches-ignore:
      - main # main pushes are format-checked by the deploy workflow
jobs:
  check-format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check-format
